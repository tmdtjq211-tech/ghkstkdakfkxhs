    const shuffle = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const drawCards = (currentDeck, num) => {
      let newDeck = [...currentDeck];
      let drawn = [];
      for (let i = 0; i < num; i++) {
        if (newDeck.length === 0) newDeck = shuffle(DECK_TEMPLATE);
        if (newDeck.length > 0) drawn.push(newDeck.pop());
      }
      return { drawn, newDeck };
    };

      } else alert(`${actionName} 실패: ${error.message}`);
    };

    function App() {

      const [pendingAction, setPendingAction] = useState(null);

      const isProcessingAI = useRef(false);

      }, [tooltipInfo]);

      // 인증 초기화
      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); }

        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          if(u) { setUser(u); if(!userName) setUserName(`Player_${u.uid.slice(0,4)}`); }
        });
        return () => unsubscribe();
      }, []);

      // DB 실시간 동기화

        if (!user || !roomId) return;

          if (snapshot.exists()) {
            const data = snapshot.data();
            setRoomData(data);
            if (data.status === 'playing') setView('game');
            else if (data.status === 'waiting') setView('charSelect');
          } else {
            setRoomData(null); setView('lobby');
          }
        }, (error) => console.error("Snapshot error:", error));
        return () => unsubscribe();
      }, [user, roomId]);

      useEffect(() => localStorage.setItem('skyMarathonImages', JSON.stringify(customImages)), [customImages]);

      // AI 턴 처리
      useEffect(() => {
        if (view !== 'game' || !roomData || !user) return;
        const currentPlayer = roomData.players[roomData.turnIndex];
        const isHost = roomData.players[0]?.id === user.uid; 
        if (currentPlayer?.isAi && isHost && !isProcessingAI.current) {
          isProcessingAI.current = true;
          setTimeout(() => { processAITurn(currentPlayer); }, 600); 
        }
      }, [roomData, view, user]);

      const handleImageChange = (key, url) => setCustomImages(prev => ({ ...prev, [key]: url }));

      const handleFileUpload = (key, event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width; let height = img.height;
            const MAX_SIZE = key === 'board' ? 1000 : 250; 
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            setCustomImages(prev => ({ ...prev, [key]: canvas.toDataURL('image/jpeg', 0.7) }));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      const createRoom = async () => {
        if (!user) return;
        try {
          const newRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), newRoomId);
          await setDoc(roomRef, {
            status: 'waiting', players: [], turnIndex: 0,
            logs: ['방이 생성되었습니다.'], deck: shuffle(DECK_TEMPLATE), lastMoveAmount: 0 
          });
          setRoomId(newRoomId);
        } catch (error) { handleFirebaseError(error, "방 만들기"); }
      };

      const joinRoom = async (id) => {
        if (!user) return;
        const targetId = id || roomId;
        if (!targetId) return;
        try {
          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), targetId.toUpperCase());
          const snap = await getDoc(roomRef);
          if (snap.exists()) {
            const data = snap.data();
            if (data.players.length >= MAX_PLAYERS && !data.players.some(p => p.id === user.uid)) {
              return alert(`방이 가득 찼습니다 (최대 ${MAX_PLAYERS}명)`);
            }
            setRoomId(targetId.toUpperCase());
          } else alert("방을 찾을 수 없습니다.");
        } catch (error) { handleFirebaseError(error, "방 입장"); }
      };

      const addAI = async () => {
        if (!roomData) return;
        if (roomData.players.length >= MAX_PLAYERS) return alert(`최대 ${MAX_PLAYERS}명까지만 참여 가능합니다.`);
        try {
          const aiId = 'ai_' + Math.random().toString(36).substring(2, 8);
          const aiName = 'AI_' + ['알파고','자비스','스카이넷','영물'][Math.floor(Math.random()*4)];
          const availableChars = Object.keys(CHARACTERS).filter(k => !roomData.players.some(p => p.charId === k));
          if (availableChars.length === 0) return alert("선택 가능한 캐릭터가 없습니다.");
          const aiCharId = availableChars[Math.floor(Math.random() * availableChars.length)];

          let t1 = Math.floor(Math.random() * 34) + 1;
          let t2 = Math.floor(Math.random() * 34) + 1;
          while(t1 === t2) t2 = Math.floor(Math.random() * 34) + 1;

          const newDeck = [...roomData.deck];
          const initialHand = newDeck.splice(0, 4);

          const aiPlayer = {
            id: aiId, name: aiName, charId: aiCharId, position: 0, prevPosition: 0,
            hand: initialHand, overpaceTokens: 3, awakenToken: 1, targets: [t1, t2],
            targetsReached: 0, isShielded: false, isStopped: false, cardsUsedThisTurn: 0,
            hasMovedThisTurn: false, isAi: true, overpaceUsedThisTurn: false
          };

          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), roomId);
          await updateDoc(roomRef, {
            players: [...roomData.players, aiPlayer], deck: newDeck,
            logs: [...roomData.logs, `🤖 ${aiName}님이 참가했습니다!`]
          });
        } catch (error) { handleFirebaseError(error, "AI 추가"); }
      };

      const selectCharacter = async (charId) => {
        if (!roomData) return;
        const myPlayerCheck = roomData.players.find(p => p.id === user.uid);
        if (roomData.players.length >= MAX_PLAYERS && !myPlayerCheck) return alert(`방이 찼습니다 (최대 ${MAX_PLAYERS}명)`);

        try {
          let t1 = Math.floor(Math.random() * 34) + 1;
          let t2 = Math.floor(Math.random() * 34) + 1;
          while(t1 === t2) t2 = Math.floor(Math.random() * 34) + 1;

          const newDeck = [...roomData.deck];
          const initialHand = newDeck.splice(0, 4);

          const newPlayer = {
            id: user.uid, name: userName, charId, position: 0, prevPosition: 0,
            hand: initialHand, overpaceTokens: 3, awakenToken: 1, targets: [t1, t2],
            targetsReached: 0, isShielded: false, isStopped: false, cardsUsedThisTurn: 0, 
            hasMovedThisTurn: false, overpaceUsedThisTurn: false
          };

          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), roomId);
          await updateDoc(roomRef, {
            players: [...roomData.players, newPlayer], deck: newDeck,
            logs: [...roomData.logs, `${userName}님이 ${CHARACTERS[charId].name}를 선택했습니다.`]
          });
        } catch (error) { handleFirebaseError(error, "캐릭터 선택"); }
      };

      const startGame = async () => {
        try {
          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), roomId);
          await updateDoc(roomRef, { status: 'playing', logs: [...roomData.logs, '게임이 시작되었습니다!'] });
        } catch (error) { handleFirebaseError(error, "게임 시작"); }
      };

      const myPlayer = roomData?.players.find(p => p.id === user?.uid);
      const isMyTurn = roomData?.players[roomData?.turnIndex]?.id === user?.uid;

      const addLog = async (msg) => {
        try {
          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), roomId);
          await updateDoc(roomRef, { logs: [...roomData.logs.slice(-20), msg] });
        } catch (error) { console.error(error); }
      };

      const updatePlayers = async (newPlayers, extraData = {}) => {
        try {
          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), roomId);
          await updateDoc(roomRef, { players: newPlayers, ...extraData });
        } catch (error) { console.error(error); }
      };

      const processAITurn = async (aiInfo) => {
        let newPlayers = [...roomData.players];
        let myAi = { ...newPlayers.find(p => p.id === aiInfo.id) };
        let logs = []; let nextMoveAmount = roomData.lastMoveAmount || 0;

        if (myAi.isStopped) {
            logs.push(`🤖 [AI] ${myAi.name}님은 신호등에 걸려 휴식합니다.`);
            myAi.isStopped = false; 
        } else {
            let activeTarget = myAi.targets.find((t) => t !== -1) ?? 35; 
            const getDist = (pos, target) => (target - pos + 36) % 36;
            const getRevDist = (pos, target) => (pos - target + 36) % 36;
            let dist = getDist(myAi.position, activeTarget);
            let revDist = getRevDist(myAi.position, activeTarget);
            
            if (myAi.overpaceTokens > 0 && !myAi.overpaceUsedThisTurn && dist >= 8 && activeTarget !== 35) {
                myAi.overpaceTokens -= 1; myAi.overpaceUsedThisTurn = true;
                myAi.position = (myAi.position + 5) % 36;
                logs.push(`🤖 [AI] 🔥오버페이스 토큰 사용!`);
                dist = getDist(myAi.position, activeTarget); revDist = getRevDist(myAi.position, activeTarget);
            }

            let cardsUsed = 0; let hand = [...myAi.hand];
            const targetHuman = newPlayers.filter(p => !p.isAi)[0];

            for (let i = hand.length - 1; i >= 0 && cardsUsed < 2; i--) {
              const cardId = hand[i]; let used = false;
              if (cardId === 'angel' && dist === 3) { myAi.position = (myAi.position + 3) % 36; used = true; logs.push(`🤖 [AI] 천사(+3) 사용!`); } 
              else if (cardId === 'zikooter' && revDist === 2) { myAi.position = (myAi.position - 2 + 36) % 36; used = true; logs.push(`🤖 [AI] 지쿠터(-2)를 자신에게 사용!`); } 
              else if (cardId === 'bicycle' && revDist === 3) { myAi.position = (myAi.position - 3 + 36) % 36; used = true; logs.push(`🤖 [AI] 자전거(-3)를 자신에게 사용!`); } 
              else if (cardId === 'overpace' && dist >= 6) { myAi.position = (myAi.position + 5) % 36; used = true; logs.push(`🤖 [AI] 오버페이스(+5) 사용!`); } 
              else if (cardId === 'timeWarp' && roomData.lastMoveAmount > 0 && roomData.lastMoveAmount <= dist) { myAi.position = (myAi.position + roomData.lastMoveAmount) % 36; used = true; logs.push(`🤖 [AI] 시간가속 사용!`); } 
              else if (['devil', 'trafficLight', 'timeRewind'].includes(cardId) && targetHuman && Math.random() > 0.3) {
                 let hIndex = newPlayers.findIndex(p => p.id === targetHuman.id);
                 if (!newPlayers[hIndex].isShielded) {
                     if (cardId === 'devil') { newPlayers[hIndex].position = Math.max(0, newPlayers[hIndex].position - 6); logs.push(`🤖 [AI] ${targetHuman.name}에게 악마 투척!`); } 
                     else if (cardId === 'trafficLight') { newPlayers[hIndex].isStopped = true; logs.push(`🤖 [AI] ${targetHuman.name}에게 신호등!`); } 
                     else if (cardId === 'timeRewind') { newPlayers[hIndex].position = newPlayers[hIndex].prevPosition; logs.push(`🤖 [AI] ${targetHuman.name}에게 시간역행!`); }
                     used = true;
                 }
              }
              if (used) { hand.splice(i, 1); cardsUsed++; dist = getDist(myAi.position, activeTarget); revDist = getRevDist(myAi.position, activeTarget); }
            }
            myAi.hand = hand;
            const speed = CHARACTERS[myAi.charId].speed;
            if (myAi.position !== activeTarget) {
                if (dist >= speed || activeTarget === 35) {
                    myAi.position = (myAi.position + speed) % 36; nextMoveAmount = speed;
                    logs.push(`🤖 [AI] 기본 이동(${speed}칸) -> ${myAi.position}칸`);
                } else logs.push(`🤖 [AI] 목표 안착을 위해 멈춰 섰습니다.`);
            }

            if (myAi.targets.includes(myAi.position)) {
                myAi.targetsReached += 1;
                logs.push(`🎯 [AI 각성] 목표 숫자 [${myAi.position}] 도달!`);
                myAi.targets = myAi.targets.map(t => t === myAi.position ? -1 : t);
            }
        }
        newPlayers = newPlayers.map(p => p.id === myAi.id ? myAi : p);
        let nextIndex = (roomData.turnIndex + 1) % roomData.players.length;
        newPlayers = newPlayers.map(p => ({...p, hasMovedThisTurn: false, cardsUsedThisTurn: 0, overpaceUsedThisTurn: false}));
        
        const { drawn, newDeck } = drawCards(roomData.deck, 1);
        newPlayers[nextIndex].hand.push(...drawn);

        try {
          const roomRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'skyRooms'), roomId);
          await updateDoc(roomRef, { players: newPlayers, turnIndex: nextIndex, lastMoveAmount: nextMoveAmount, deck: newDeck, logs: [...roomData.logs.slice(-20), ...logs] });
        } catch(e) { console.error("AI Turn Error", e); }
        isProcessingAI.current = false;
      };

      const movePlayer = (players, targetUserId, amount) => {
        return players.map(p => {
          if (p.id === targetUserId) {
            let newPos = p.position + amount;
            if (newPos < 0) newPos = 0; 
            if (newPos >= TOTAL_CELLS) newPos = newPos - TOTAL_CELLS; 
            let reached = p.targetsReached; let tgs = [...p.targets];
            if (tgs.includes(newPos)) { reached += 1; tgs[tgs.indexOf(newPos)] = -1; }
            return { ...p, prevPosition: p.position, position: newPos, targetsReached: reached, targets: tgs };
          }
          return p;
        });
      };

      const handleTokenUse = async (type) => {
        if (!isMyTurn) return;
        let newPlayers = [...roomData.players];
        let me = newPlayers.find(p => p.id === user.uid);
        let moveAmt = 0; let logMsg = "";

        if (type === 'overpace') {
            if (me.overpaceUsedThisTurn) return alert("오버페이스 토큰은 1턴에 1번만 사용할 수 있습니다!");
            if (me.overpaceTokens > 0) { me.overpaceTokens -= 1; me.overpaceUsedThisTurn = true; moveAmt = 5; logMsg = `🔥 ${me.name}님이 오버페이스 토큰 사용! 5칸 전진!`; }
        } else if (type === 'awaken' && me.awakenToken > 0 && me.targetsReached > 0) {
            me.awakenToken -= 1; logMsg = `⚡ ${me.name}님이 각성 능력을 발동했습니다! [${CHARACTERS[me.charId].awaken}]`;
        } else return; 

        if (moveAmt !== 0) newPlayers = movePlayer(newPlayers, me.id, moveAmt);
        else newPlayers = newPlayers.map(p => p.id === me.id ? me : p);
        addLog(logMsg); await updatePlayers(newPlayers);
      };

      const handleDoubleClickCard = (cardIdx, cardId) => {
        if (!isMyTurn) return;
        if (myPlayer.cardsUsedThisTurn >= 2) return alert("이번 턴에는 더 이상 카드를 사용할 수 없습니다 (최대 2장).");
        setTooltipInfo(null);
        setShowHandModal(false); // 카드 사용 시 모달 닫기
        
        const cardData = CARDS[cardId];
        if (cardData.type === 'target') { setPendingAction({ type: 'card', cardIdx, cardId }); setTargetSelectMode(true); } 
        else executeCardEffect(cardIdx, cardId, myPlayer.id);
      };

      const handleTargetSelect = async (targetUserId) => {
        if (pendingAction.type === 'card') executeCardEffect(pendingAction.cardIdx, pendingAction.cardId, targetUserId);
        setTargetSelectMode(false); setPendingAction(null);
      };

      const executeCardEffect = async (cardIdx, cardId, targetUserId) => {
        let newPlayers = [...roomData.players];
        const targetPlayer = newPlayers.find(p => p.id === targetUserId);
        const targetName = targetPlayer.name;

        if (targetPlayer.isShielded && targetUserId !== user.uid) {
          addLog(`${targetName}님은 천사의 보호를 받고 있어 효과가 무효화되었습니다!`);
        } else {
          let moveAmt = 0;
          if (cardId === 'zikooter') moveAmt = -2;
          if (cardId === 'bicycle') moveAmt = -3;
          if (cardId === 'devil') moveAmt = -6;
          if (cardId === 'angel') moveAmt = 3; 
          if (cardId === 'overpace') moveAmt = 5;
          if (cardId === 'timeWarp') moveAmt = roomData.lastMoveAmount || 0;
          
          if (moveAmt !== 0) {
             newPlayers = movePlayer(newPlayers, targetUserId, moveAmt);
             addLog(`${userName}님이 ${CARDS[cardId].name} 사용! ${targetName} ${moveAmt > 0 ? '+'+moveAmt : moveAmt}칸 이동.`);
          }
          if (cardId === 'timeRewind') {
             newPlayers = newPlayers.map(p => p.id === targetUserId ? {...p, position: p.prevPosition} : p);
             addLog(`${userName}님이 시간 역행 사용! ${targetName}님이 이전 위치로 돌아갑니다.`);
          }
          if (cardId === 'trafficLight') addLog(`${userName}님이 신호등 사용! ${targetName}님 발이 묶입니다.`);
        }

        newPlayers = newPlayers.map(p => {
          if (p.id === user.uid) {
            const newHand = [...p.hand]; newHand.splice(cardIdx, 1);
            return { ...p, hand: newHand, cardsUsedThisTurn: p.cardsUsedThisTurn + 1 };
          }
          return p;
        });
        await updatePlayers(newPlayers);
      };

      const handleBaseMove = async () => {
        if(!isMyTurn || myPlayer.hasMovedThisTurn) return;
        const charData = CHARACTERS[myPlayer.charId];
        let newPlayers = movePlayer(roomData.players, user.uid, charData.speed);
        newPlayers = newPlayers.map(p => p.id === user.uid ? {...p, hasMovedThisTurn: true} : p);
        await updatePlayers(newPlayers, { lastMoveAmount: charData.speed });
        addLog(`${userName}님이 기본 이동으로 ${charData.speed}칸 전진했습니다.`);
      };

      const handleGambleClick = () => {
        if (!isMyTurn) return;
        if (myPlayer.hand.length === 0) return alert("버릴 카드가 없어서 도박을 할 수 없습니다!");
        setGambleState('discard');
      };

      const executeGamble = async (guess) => {
        const roll = Math.floor(Math.random() * 10) + 1; 
        const isOdd = roll % 2 !== 0;
        const isSuccess = (guess === 'odd' && isOdd) || (guess === 'even' && !isOdd);
        let moveAmt = isSuccess ? roll : -roll;
        
        let newPlayers = [...roomData.players];
        newPlayers = newPlayers.map(p => {
          if (p.id === user.uid) {
            const newHand = [...p.hand]; newHand.splice(pendingGambleCardIdx, 1);
            return { ...p, hand: newHand };
          }
          return p;
        });
        
        newPlayers = movePlayer(newPlayers, user.uid, moveAmt);
        await updatePlayers(newPlayers, { lastMoveAmount: Math.abs(moveAmt) });
        addLog(`🎲 도박: [${guess === 'odd' ? '홀' : '짝'}] 선택 -> 주사위 [${roll}]! ${isSuccess ? '대성공! 앞으로' : '실패... 뒤로'} ${Math.abs(moveAmt)}칸 이동.`);
        setGambleState(null); setPendingGambleCardIdx(null);
      };

      const endTurn = async () => {
        if (!isMyTurn) return;
        let nextIndex = (roomData.turnIndex + 1) % roomData.players.length;
        let newPlayers = [...roomData.players];
        newPlayers = newPlayers.map(p => {
            if(p.id === user.uid) return {...p, hasMovedThisTurn: false, cardsUsedThisTurn: 0, overpaceUsedThisTurn: false};
            return p;
        });
        const { drawn, newDeck } = drawCards(roomData.deck, 1);
        newPlayers[nextIndex].hand.push(...drawn);
        await updatePlayers(newPlayers, { turnIndex: nextIndex, deck: newDeck });
        addLog(`턴이 종료되었습니다. 다음 차례입니다.`);
      };

      const calculateBoardPosition = (index) => {
        const angle = Math.PI / 2 + (index / TOTAL_CELLS) * 2 * Math.PI; 
        const rx = 42; const ry = 38;
        return { left: `calc(50% + ${rx * Math.cos(angle)}%)`, top: `calc(50% + ${ry * Math.sin(angle)}%)` };
      };

            </div>
            <p className="text-xs text-gray-400 mt-6">{authError}</p>
          </div>

      const opponents = roomData?.players.filter(p => p.id !== user?.uid) || [];

      return (
        <div className="w-full h-full flex flex-col relative bg-slate-900 text-white">
          
          <button onClick={() => setShowAdmin(true)} className="absolute top-4 left-4 z-50 p-2 bg-white/10 hover:bg-white/20 rounded-full backdrop-blur transition-colors border border-white/20 shadow-md">
            <Settings size={20} className="text-white" />
          </button>

          {showAdmin && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
              <div className="bg-slate-800 p-6 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-600">

                <p className="text-xs text-slate-300 mb-6 bg-slate-900 p-2 rounded">갤러리에서 이미지를 선택하면 기기에 자동으로 저장되며, 게임에 즉시 반영됩니다.</p>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                  {Object.keys(customImages).map(key => {
                    const isBase64 = customImages[key].startsWith('data:image');
                    return (
                      <div key={key} className="flex flex-col items-center bg-slate-700 p-3 rounded-xl border border-slate-600 shadow-sm">
                        <label className="text-sm font-black capitalize mb-2 text-sky-300">{key}</label>
                        <img src={customImages[key]} alt={key} className="w-16 h-16 object-cover rounded-lg mb-3 border shadow-inner bg-black" />
                        <label className="w-full bg-sky-500 hover:bg-sky-600 active:scale-95 text-white text-[11px] font-bold py-2 px-1 rounded-lg cursor-pointer text-center transition-all mb-2 shadow-sm">
                          📷 갤러리 첨부
                          <input type="file" accept="image/*" onChange={(e) => handleFileUpload(key, e)} className="hidden" />
                        </label>
                        <button onClick={() => handleImageChange(key, DEFAULT_IMAGES[key])} className="text-[10px] text-rose-400 hover:text-rose-300 font-bold mt-1">기본값 복구</button>
                      </div>
                    )
                  })}
                </div>
                <button onClick={() => setShowAdmin(false)} className="mt-8 w-full bg-slate-900 hover:bg-black text-white py-4 rounded-xl font-black text-lg shadow-lg active:scale-95 border border-slate-600">닫기</button>
              </div>
            </div>
          )}

          {/* --- 🃏 내 패 크게보기 모달 --- */}
          {showHandModal && myPlayer && (
            <div className="fixed inset-0 z-[120] flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm p-4">
              <div className="bg-slate-800 border-2 border-indigo-500 rounded-3xl p-4 sm:p-6 w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-4 shrink-0 border-b border-slate-700 pb-4">
                  <h2 className="text-xl sm:text-2xl font-black text-white flex items-center gap-2">🃏 내 패 <span className="text-xs sm:text-sm font-bold text-slate-400">(더블 터치로 사용)</span></h2>
                  <span className="text-xs sm:text-sm text-sky-300 font-bold bg-slate-900 px-3 py-1 rounded-full border border-sky-900">이번 턴 사용: {myPlayer.cardsUsedThisTurn}/2</span>
                </div>
                <div className="flex-1 overflow-y-auto p-2 sm:p-4 bg-slate-900/50 rounded-2xl">
                   <div className="flex flex-wrap justify-center gap-3 sm:gap-4">
                    {myPlayer.hand.length === 0 ? (
                      <div className="flex items-center justify-center text-slate-500 font-bold text-sm w-full h-32">카드가 없습니다.</div>
                    ) : (
                      myPlayer.hand.map((cardId, idx) => {
                        const card = CARDS[cardId];
                        return (
                          <div key={idx}
                               onClick={() => {
                                 if (gambleState === 'discard') {
                                   setPendingGambleCardIdx(idx);
                                   setGambleState('guess');
                                   setShowHandModal(false);
                                 } else {
                                   setTooltipInfo({ title: card.name, desc: card.desc });
                                 }
                               }}
                               onDoubleClick={() => {
                                 if (gambleState !== 'discard') {
                                   handleDoubleClickCard(idx, cardId);
                                 }
                               }}
                               className={`w-[80px] h-[120px] sm:w-[100px] sm:h-[145px] rounded-xl flex flex-col cursor-pointer shadow-lg transform transition-all overflow-hidden ${gambleState === 'discard' ? 'border-4 border-rose-500 hover:scale-105 animate-pulse bg-rose-100' : 'border-2 border-slate-400 bg-slate-100 hover:-translate-y-2 hover:border-sky-400 hover:shadow-[0_10px_20px_rgba(56,189,248,0.3)]'}`}>
                            <img src={customImages[cardId]} className="w-full h-[60%] object-cover border-b-2 border-slate-400 bg-black" alt=""/>
                            <div className="p-1 flex-1 flex items-center justify-center bg-gradient-to-b from-white to-slate-200">
                              <span className="font-black text-[11px] sm:text-xs text-slate-800 text-center leading-tight break-keep">{card.name}</span>
                            </div>
                          </div>
                        )
                      })
                    )}
                   </div>
                </div>
                <button onClick={() => setShowHandModal(false)} className="mt-4 w-full bg-slate-700 hover:bg-slate-600 text-white font-black py-3 sm:py-4 rounded-xl shrink-0 transition-colors text-sm sm:text-base border border-slate-500 shadow-lg active:scale-95">닫기</button>
              </div>
            </div>
          )}

          {tooltipInfo && (
            <div className="fixed bottom-32 left-1/2 -translate-x-1/2 z-[90] bg-slate-900/95 border border-sky-400 text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(56,189,248,0.5)] text-center pointer-events-none animate-bounce whitespace-nowrap">
              <h3 className="text-sm font-bold text-sky-300">{tooltipInfo.title} <span className="text-xs text-slate-200 font-normal ml-2">{tooltipInfo.desc}</span></h3>
            </div>
          )}

          {gambleState === 'discard' && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[90] bg-rose-600 text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(225,29,72,0.5)] text-center animate-pulse border-2 border-white pointer-events-auto flex flex-col items-center">
              <h3 className="text-sm font-bold">🎲 버릴 카드를 1장 터치하세요!</h3>
              <button onClick={() => setGambleState(null)} className="text-[10px] underline mt-1">취소</button>
            </div>
          )}

          {gambleState === 'guess' && (
            <div className="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm p-4">
              <div className="bg-slate-800 border-2 border-rose-500 rounded-2xl p-6 sm:p-8 w-full max-w-sm shadow-[0_0_40px_rgba(244,63,94,0.4)]">
                <h2 className="text-2xl sm:text-3xl font-black text-white text-center mb-2">🎲 10면체 도박</h2>
                <p className="text-slate-300 text-center text-xs sm:text-sm mb-6">주사위(1~10) 홀짝 맞히기!<br/>성공 시 전진, 실패 시 후진</p>
                <div className="flex gap-4 mb-6">
                  <button onClick={() => executeGamble('odd')} className="flex-1 bg-sky-600 hover:bg-sky-500 text-white font-black py-4 sm:py-6 rounded-xl text-lg sm:text-xl shadow-lg active:scale-95">홀수<br/><span className="text-[10px] font-normal">(1,3,5,7,9)</span></button>
                  <button onClick={() => executeGamble('even')} className="flex-1 bg-rose-600 hover:bg-rose-500 text-white font-black py-4 sm:py-6 rounded-xl text-lg sm:text-xl shadow-lg active:scale-95">짝수<br/><span className="text-[10px] font-normal">(2,4,6,8,10)</span></button>
                </div>
                <button onClick={() => { setGambleState(null); setPendingGambleCardIdx(null); }} className="w-full bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 rounded-xl">취소</button>
              </div>
            </div>
          )}

          {targetSelectMode && pendingAction && (
            <div className="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm p-4">
              <div className="flex flex-col items-center w-full max-w-2xl max-h-full overflow-y-auto pb-10">
                <h2 className="text-2xl sm:text-3xl font-black text-white text-center mb-2 mt-4 drop-shadow-lg">대상을 지정하세요</h2>
                <p className="text-sky-300 text-center text-sm mb-6 font-bold bg-slate-900/80 px-6 py-2 rounded-full border border-slate-600 shadow-xl">사용 카드: [{CARDS[pendingAction.cardId].name}]</p>
                <div className="flex flex-row flex-wrap justify-center gap-3 sm:gap-6 mb-6 w-full">
                  {roomData.players.map(p => (
                    <button key={p.id} onClick={() => handleTargetSelect(p.id)} className={`flex flex-col items-center p-3 sm:p-4 w-[100px] sm:w-[130px] rounded-2xl border-4 transition-transform active:scale-95 shadow-2xl ${p.id === user.uid ? 'bg-green-900/60 border-green-400' : 'bg-slate-800 border-sky-400'}`}>
                      <img src={customImages[p.charId]} alt={p.name} className="w-14 h-14 sm:w-20 sm:h-20 rounded-full border-2 border-white/50 object-cover mb-2 shadow-md bg-black" />
                      <span className="text-white font-bold text-xs sm:text-sm truncate w-full text-center">{p.name}</span>
                      <span className="text-[10px] text-sky-200 font-bold bg-black/50 px-2 py-0.5 rounded-full mt-1 w-full text-center">위치: {p.position}</span>
                    </button>
                  ))}
                </div>
                <button onClick={() => { setTargetSelectMode(false); setPendingAction(null); }} className="bg-slate-700 text-white font-bold px-10 py-3 rounded-full shadow-lg border border-slate-500 active:scale-95">사용 취소</button>
              </div>
            </div>
          )}

          {view === 'lobby' && (
            <div className="flex-1 flex items-center justify-center p-4 bg-sky-50 text-gray-800">
              <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-8 border-sky-400">
                <h1 className="text-3xl font-black text-sky-600 mb-2 tracking-tight">하늘나라 마라톤</h1>
                <p className="text-gray-500 mb-8 text-sm font-bold">목표 칸에 정확히 안착하세요!</p>
                <input type="text" placeholder="닉네임 입력" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-100 border-none p-4 rounded-xl mb-4 text-center font-black focus:ring-2 focus:ring-sky-400 outline-none transition-shadow" />
                <button onClick={createRoom} className="w-full bg-gradient-to-r from-sky-400 to-blue-500 hover:from-sky-500 hover:to-blue-600 text-white font-black py-4 px-4 rounded-xl flex items-center justify-center gap-2 mb-4 shadow-lg active:scale-95 transition-transform"><Play size={20} fill="currentColor" /> 새 게임 방 만들기</button>
                <div className="flex gap-2">
                  <input type="text" placeholder="방 코드 (대문자)" value={roomId} onChange={e => setRoomId(e.target.value)} className="flex-[2] bg-slate-100 border-none p-4 rounded-xl text-center font-black uppercase focus:ring-2 focus:ring-indigo-400 outline-none" />
                  <button onClick={() => joinRoom(roomId)} className="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white font-black py-4 px-2 rounded-xl shadow-lg active:scale-95 transition-transform">입장</button>
                </div>
              </div>
            </div>
          )}

          {view === 'charSelect' && (
            <div className="flex-1 flex flex-col items-center overflow-y-auto p-4 bg-sky-50 text-gray-800">
              <div className="w-full max-w-4xl bg-white p-5 sm:p-8 rounded-3xl shadow-2xl mt-4 sm:mt-10 mb-10 border border-slate-200">
                <div className="flex justify-between items-center mb-6 border-b-2 border-slate-100 pb-4">
                  <h2 className="text-lg sm:text-2xl font-black text-slate-700">방 코드: <span className="text-sky-500">{roomId}</span></h2>
                  <div className="flex gap-2 sm:gap-4 items-center">
                    <div className="flex items-center text-xs sm:text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full"><Users size={16} className="mr-1 text-slate-400"/> {roomData.players.length} / {MAX_PLAYERS}</div>
                    {roomData.players.length > 0 && roomData.players.length < MAX_PLAYERS && (
                      <button onClick={addAI} className="bg-purple-500 hover:bg-purple-600 active:scale-95 text-white px-3 sm:px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold shadow-md transition-transform">🤖 AI 추가</button>
                    )}
                  </div>
                </div>

                {!myPlayer ? (
                  <div className="flex-1 flex flex-col">
                    <h3 className="text-sm sm:text-lg font-black mb-4 text-center text-slate-600 bg-sky-100 py-2 rounded-xl">원하는 캐릭터를 <span className="text-sky-600">더블 터치</span> 하세요</h3>
                    {roomData.players.length >= MAX_PLAYERS ? (
                      <div className="text-center text-rose-500 font-black py-10 text-xl bg-rose-50 rounded-2xl border border-rose-200">방이 가득 찼습니다! (최대 4명)</div>

                              className={`border-4 rounded-2xl p-2 sm:p-3 cursor-pointer transition-all ${isTaken ? 'opacity-40 bg-slate-100 border-slate-300 grayscale' : isFocused ? 'border-sky-500 bg-sky-50 scale-105 shadow-xl' : 'border-slate-200 bg-white hover:bg-slate-50 hover:scale-105'} relative`}>
                              <img src={customImages[key]} alt={char.name} className="w-full h-24 sm:h-28 object-cover rounded-xl mb-2 bg-slate-200" />
                              <div className="text-center font-black text-sm sm:text-base text-slate-800">{char.name}</div>

                    <CheckCircle2 size={64} className="text-green-500 mb-4" />

                  </div>

                {roomData.players.length > 0 && myPlayer && (
                  <div className="mt-8 flex justify-center border-t-2 border-slate-100 pt-8">

                 </div>

                 <button onClick={() => setShowHandModal(true)} className="absolute bottom-4 right-4 z-40 bg-indigo-600 text-white px-4 py-2 sm:px-5 sm:py-3 rounded-full shadow-[0_0_15px_rgba(79,70,229,0.5)] border-2 border-indigo-400 flex items-center gap-2 active:scale-95 transition-transform">

                              {opp.hand.map((_, i) => <img key={i} src={customImages.cardBack} className="w-4 h-6 object-cover rounded-[2px] border border-slate-400 shadow-sm" alt=""/>)}

                        </div>

                 <div className="flex flex-row landscape:flex-col lg:flex-col p-2 gap-2 border-b-2 border-slate-700 shrink-0 bg-slate-800">

                       <div className="relative shrink-0">
                         <img src={customImages[myPlayer.charId]} alt="Me" className={`w-12 h-12 sm:w-14 sm:h-14 rounded-full object-cover border-2 bg-black ${isMyTurn ? 'border-green-400' : 'border-sky-400'}`} />
                         {isMyTurn && <div className="absolute -top-1 -right-1 bg-green-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full animate-bounce shadow-md">내 턴!</div>}
                       </div>
                       <div className="flex-1">

                       <span className="text-[10px] text-sky-300 font-bold bg-slate-900 px-2 py-0.5 rounded-full border border-sky-900">사용: {myPlayer.cardsUsedThisTurn}/2</span>

                    <div className="grid grid-cols-4 landscape:grid-cols-3 lg:grid-cols-3 gap-2">

                          const card = CARDS[cardId];
                          return (
                            <div key={idx} onClick={() => { if (gambleState === 'discard') { setPendingGambleCardIdx(idx); setGambleState('guess'); } else setTooltipInfo({ title: card.name, desc: card.desc }); }} onDoubleClick={() => { if (gambleState !== 'discard') handleDoubleClickCard(idx, cardId); }}
                                 className={`aspect-[2/3] rounded-xl flex flex-col cursor-pointer shadow-md transform transition-all overflow-hidden ${gambleState === 'discard' ? 'border-4 border-rose-500 hover:scale-105 animate-pulse bg-rose-100' : 'border-2 border-slate-400 bg-slate-100 hover:-translate-y-1 hover:border-sky-400'}`}>
                              <img src={customImages[cardId]} className="w-full h-[65%] object-cover border-b-2 border-slate-400 bg-black" alt=""/>
                              <div className="p-0.5 flex-1 flex items-center justify-center bg-gradient-to-b from-white to-slate-200">
                                <span className="font-black text-[9px] sm:text-[10px] text-slate-800 text-center leading-tight break-keep">{card.name}</span>
                              </div>
                            </div>
                          )

                      )}
                    </div>
                 </div>

                 <div className="p-2 sm:p-3 bg-slate-900 border-t-2 border-slate-700 shrink-0 flex flex-col gap-2">
                    <div className="flex gap-2 w-full">
                      <button onClick={() => setTooltipInfo({ title: '오버페이스', desc: '+5칸 (턴당 1회)' })} onDoubleClick={() => handleTokenUse('overpace')} className={`flex-1 text-[10px] font-black py-2 rounded-xl border-2 transition-colors ${myPlayer.overpaceUsedThisTurn ? 'bg-slate-800 border-slate-700 text-slate-600' : 'bg-orange-500/10 border-orange-500 text-orange-400 hover:bg-orange-500/30'}`}>🔥 오버페이스 ({myPlayer.overpaceTokens})</button>
                      <button onClick={() => setTooltipInfo({ title: '각성 스킬', desc: CHARACTERS[myPlayer.charId].awaken })} onDoubleClick={() => handleTokenUse('awaken')} className={`flex-1 text-[10px] font-black py-2 rounded-xl border-2 transition-colors ${myPlayer.targetsReached > 0 ? 'bg-purple-500/10 border-purple-500 text-purple-300 hover:bg-purple-500/30' : 'bg-slate-800 border-slate-700 text-slate-600'}`}>⚡ 각성 (x{myPlayer.awakenToken})</button>
                    </div>
                    {isMyTurn ? (
                      <div className="flex gap-2 w-full">
                        <button onClick={handleBaseMove} disabled={myPlayer.hasMovedThisTurn} className="flex-[2] bg-gradient-to-r from-sky-400 to-blue-600 disabled:from-slate-700 disabled:to-slate-800 disabled:text-slate-500 disabled:border-slate-600 text-white font-black py-3 rounded-xl shadow-lg active:scale-95 transition-transform text-xs border border-sky-400">🏃 기본 이동 ({CHARACTERS[myPlayer.charId].speed})</button>

                        <button onClick={endTurn} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-black py-3 rounded-xl shadow-lg text-xs active:scale-95 border border-slate-500">턴 종료</button>
                      </div>

                      <div className="w-full bg-slate-800 border-2 border-slate-700 text-slate-400 font-black py-3 rounded-xl text-center text-xs flex items-center justify-center gap-2">
                        <span className="animate-pulse h-2 w-2 bg-slate-400 rounded-full"></span> 상대방의 턴 대기 중...
                      </div>
                    )}
                 </div>
                 
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
